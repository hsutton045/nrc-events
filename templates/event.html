<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Event {{ event.event_number }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f4f6f8;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 22px;
            box-shadow: 0 1px 6px rgba(0,0,0,.08);
        }

        a {
            color: #1f6feb;
        }

        .event-text {
            white-space: pre-wrap;
            word-wrap: break-word;
            background: #fafafa;
            border: 1px solid #e5e5e5;
            padding: 14px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <p>
        <a href="/?keywords={{ keywords|urlencode }}&exclude_keywords={{ exclude_keywords|urlencode }}&start_date={{ start_date|urlencode }}&end_date={{ end_date|urlencode }}">
            ← Back to search
        </a>
    </p>

    <div class="card">
        <h1>Event {{ event.event_number }}</h1>

        <p><strong>Title:</strong> {{ event.display_title }}</p>
        <p><strong>Facility:</strong> {{ event.facility }}</p>
        <p><strong>State:</strong> {{ event.state }}</p>
        <p><strong>Report Date:</strong> {{ event.report_date }}</p>
        <p>
            <strong>Original NRC Page:</strong>
            <a href="{{ event.resolved_report_url }}" target="_blank">{{ event.resolved_report_url }}</a>
        </p>

        <h2>Event Text</h2>
        <div class="event-text">{{ event.formatted_text }}</div>
    </div>
</body>
</html>
